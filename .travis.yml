sudo: required
dist: cosmic
addons:
  apt:
    packages:
      - pandoc

language: node_js
node_js: stable

# Travis-CI Caching
cache:
  directories:
    - node_modules

# S: Build Lifecycle
install:
  - npm install

before_script:
  - npm install -g hexo-cli

script:
  - pandoc -v
  - hexo cl
  - hexo g

after_script:
  - cd ./public
  - git init
  - git config --global user.name "Along"
  - git config --global user.email "15939423778@163.com"
  - git add .
  - git commit -m "Update docs"
  - git push --force "https://${GH_TOKEN}@${GH_REF}" master:master
# E: Build LifeCycle

branches:
  only:
    - hexo
env:
 global:
   - GH_REF: github.com/AlongWY/blog.git
