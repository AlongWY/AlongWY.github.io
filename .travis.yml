language: node_js
node_js: stable

# Travis-CI Caching
cache:
  directories:
    - node_modules

# S: Build Lifecycle
install:
  - npm install

before_script:
  - npm install -g vue-cli

script:
  - npm run build

after_script:
  - cd ./dist
  - echo alongwy.top > CNAME
  - git init
  - git config --global user.name "Along"
  - git config --global user.email "15939423778@163.com"
  - git add .
  - git commit -m "Update Index Pages"
  - git push --force "https://${GH_TOKEN}@${GH_REF}" master:master
# E: Build LifeCycle

branches:
  only:
    - index
env:
 global:
   - GH_REF: github.com/AlongWY/AlongWY.github.io.git
